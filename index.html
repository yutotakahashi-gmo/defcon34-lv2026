<script>
const B=JSON.parse(document.getElementById('payload').textContent);
const KEYNAME='defcon34_unlock', DAYS=50;
const enc=new TextEncoder();
const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const b64e=buf=>btoa(String.fromCharCode.apply(null,new Uint8Array(buf)));
async function deriveKey(pw){
  const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:b64d(B.salt),iterations:B.iter,hash:'SHA-256'},
    base,{name:'AES-GCM',length:256},true,['decrypt']);
}
async function decryptWith(key){
  const buf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(B.iv)},key,b64d(B.ct));
  return new TextDecoder().decode(buf);
}
function render(html){ document.open(); document.write(html); document.close(); }
function showLock(){
  const l=document.getElementById('lock'); l.style.display='block';
  document.getElementById('pw').focus();
}
// try saved unlock (valid for DAYS days)
(async()=>{
  try{
    const saved=JSON.parse(localStorage.getItem(KEYNAME)||'null');
    if(saved && saved.exp>Date.now() && saved.k){
      const key=await crypto.subtle.importKey('raw',b64d(saved.k),{name:'AES-GCM'},false,['decrypt']);
      const html=await decryptWith(key);
      render(html); return;
    }
  }catch(e){}
  try{ localStorage.removeItem(KEYNAME); }catch(e){}
  showLock();
})();
document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  const err=document.getElementById('err'); err.textContent='';
  try{
    const key=await deriveKey(document.getElementById('pw').value);
    const html=await decryptWith(key);             // throws if wrong code
    try{
      const raw=await crypto.subtle.exportKey('raw',key);
      localStorage.setItem(KEYNAME, JSON.stringify({exp:Date.now()+DAYS*86400000, k:b64e(raw)}));
    }catch(e){}
    render(html);
  }catch(_){ err.textContent='Access denied. Wrong code.';
    document.getElementById('pw').value=''; }
});
</script>
</body>

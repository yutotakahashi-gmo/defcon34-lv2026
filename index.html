<script>
var B=JSON.parse(document.getElementById('payload').textContent);
var KEYNAME='defcon34_unlock', DAYS=50;
var enc=new TextEncoder();
function b64d(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
function b64e(buf){return btoa(String.fromCharCode.apply(null,new Uint8Array(buf)));}
async function deriveKey(pw){
  var base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(B.salt),iterations:B.iter,hash:'SHA-256'},
    base,{name:'AES-GCM',length:256},true,['decrypt']);
}
async function decryptWith(key){
  var buf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(B.iv)},key,b64d(B.ct));
  return new TextDecoder().decode(buf);
}
function render(html){
  document.open(); document.write(html); document.close();
  document.querySelectorAll('script').forEach(function(old){
    var s=document.createElement('script');
    for(var i=0;i<old.attributes.length;i++){ s.setAttribute(old.attributes[i].name, old.attributes[i].value); }
    s.textContent=old.textContent;
    old.parentNode.replaceChild(s,old);
  });
}
function showLock(){ var l=document.getElementById('lock'); l.style.display='block'; document.getElementById('pw').focus(); }
(async function(){
  try{
    var saved=JSON.parse(localStorage.getItem(KEYNAME)||'null');
    if(saved && saved.exp>Date.now() && saved.k){
      var key=await crypto.subtle.importKey('raw',b64d(saved.k),{name:'AES-GCM'},false,['decrypt']);
      var html=await decryptWith(key);
      render(html); return;
    }
  }catch(e){}
  try{ localStorage.removeItem(KEYNAME); }catch(e){}
  showLock();
})();
document.getElementById('f').addEventListener('submit',async function(e){
  e.preventDefault();
  var err=document.getElementById('err'); err.textContent='';
  try{
    var key=await deriveKey(document.getElementById('pw').value);
    var html=await decryptWith(key);
    try{
      var raw=await crypto.subtle.exportKey('raw',key);
      localStorage.setItem(KEYNAME, JSON.stringify({exp:Date.now()+DAYS*86400000, k:b64e(raw)}));
    }catch(e){}
    render(html);
  }catch(_){ err.textContent='Access denied. Wrong code.'; document.getElementById('pw').value=''; }
});
</script>
